<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <!-- Firebase Browser SDK (Version 8 – funktioniert ohne Module!) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
      padding-top: 80px;
    }
    input, button {
      padding: 10px;
      margin: 10px;
      width: 250px;
      border-radius: 6px;
      border: none;
      font-size: 16px;
    }
    button {
      background: #4a90e2;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #357ABD;
    }
  </style>
</head>
<body>

<h1>Login</h1>

<!-- Email Login -->
<input id="email" type="email" placeholder="E-Mail"><br> <input id="password" type="password" placeholder="Passwort"><br> <button id="emailLogin">Login mit E-Mail</button>

<!-- Registrierung -->
<button id="registerBtn" style="background:#28a745;">Registrieren</button>

<script>
  // Deine Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyCWgf7NbAkiMp_oX0vMn_Qbgv2zRUur3Ss",
    authDomain: "sccxxxx-3b2aa.firebaseapp.com",
    projectId: "sccxxxx-3b2aa",
    storageBucket: "sccxxxx-3b2aa.firebasestorage.app",
    messagingSenderId: "590624633616",
    appId: "1:590624633616:web:507dfa1bbe5de942edab95",
    measurementId: "G-JGWKN9YFR2"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // Redirect zurück zu deiner Google-Site
  const redirectURL = "https://sites.google.com/view/jasper-team-new-a5gb4uz4dsaf54/angemeldet-55487";
 
  // Email Login
  document.getElementById("emailLogin").onclick = () => {
    const email = document.getElementById("email").value;
    const pw = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, pw)
      .then(() => window.location.href = redirectURL)
      .catch(err => alert(err.message));
  };

  // Registrierung
  document.getElementById("registerBtn").onclick = () => {
    const email = document.getElementById("email").value;
    const pw = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, pw)
      .then(() => {
        alert("Registrierung erfolgreich!");
        window.location.href = redirectURL;
      })
      .catch(err => alert(err.message));
  };
</script>

</body>
</html>
